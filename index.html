<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milsoft.mx | The Divine Feminine</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
        <div class="brand-header">
            <img src="Milsoft.jpeg" alt="Milsoft.mx Logo">
        </div>
        <div class="header-cart" onclick="abrirCarrito()">
            Bolsa 👜 (<span id="contador-carrito">0</span>)
        </div>
    </header>

    <nav class="filtros">
        <button class="btn-filtro" onclick="filtrar('TODOS')">Todo</button>
        <button class="btn-filtro" onclick="filtrar('MAKE UP')">Make Up</button>
        <button class="btn-filtro" onclick="filtrar('MANICURISTA')">Manicurista</button>
        <button class="btn-filtro" onclick="filtrar('ESTILISMO')">Estilismo</button>
        <button class="btn-filtro" onclick="filtrar('LASHISTA')">Lashista</button>
    </nav>

    <main class="container">
        <div class="grid" id="contenedor-productos">
            </div>
    </main>

    <section id="modal-carrito" class="seccion-carrito">
        <h2>Tu Selección</h2>
        <div id="lista-carrito">Bolsa vacía.</div>
        <button class="btn-checkout" onclick="enviarPedidoWhatsApp()">Finalizar compra por WhatsApp 📱</button>
    </section>

    <script src="index.js"></script>
</body>
</html>
