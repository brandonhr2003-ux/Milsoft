<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milsoft.mx | The Divine Feminine</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #fdf6f6 0%, #fae8eb 100%); min-height: 100vh; margin: 0; padding: 40px 20px; color: #4a3f41; }
        
        /* Menú Lateral */
        .side-menu { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #fff; overflow-x: hidden; transition: 0.5s; padding-top: 60px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .side-menu a { padding: 8px 8px 8px 32px; text-decoration: none; font-size: 25px; color: #d4a3b3; display: block; transition: 0.3s; }
        .menu-icon { font-size: 30px; cursor: pointer; position: fixed; top: 20px; left: 20px; color: #d4a3b3; }

        .brand-header { text-align: center; margin-bottom: 50px; }
        .brand-header h1 { font-family: 'Playfair Display', serif; font-size: 3em; color: #d4a3b3; margin: 0; }
        .header-cart { text-align: right; max-width: 1050px; margin: 0 auto 30px auto; font-weight: 600; color: #8a6d75; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 30px; max-width: 1050px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.85); padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(212, 163, 179, 0.15); }
        button { background: #e8b4b8; color: white; border: none; padding: 12px 20px; border-radius: 15px; cursor: pointer; width: 100%; margin-top: 10px; }
        .seccion-carrito { max-width: 650px; margin: 60px auto; background: rgba(255, 255, 255, 0.9); padding: 35px; border-radius: 24px; }
        .btn-checkout { background: #d4a3b3; color: white; padding: 14px; }
    </style>
</head>
<body>

    <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
    <div id="side-menu" class="side-menu">
        <a href="javascript:void(0)" onclick="toggleMenu()">&times;</a>
        <a href="#">Inicio</a>
        <a href="#">Tienda</a>
        <a href="#">Contacto</a>
    </div>

    <div class="brand-header">
        <img src="Milsoft.jpeg" alt="Milsoft.mx Logo" style="max-width: 400px; width: 90%; height: auto; border-radius: 20px;">
    </div>

    <div class="header-cart">
        Bolsa: <span id="contador-carrito">0</span>
    </div>

    <div class="filtros">
        <button class="btn-filtro" onclick="filtrar('TODOS')">Todos</button>
        <button class="btn-filtro" onclick="filtrar('MAKE UP')">Make up</button>
        <button class="btn-filtro" onclick="filtrar('MANICURISTA')">Manicurista</button>
        <button class="btn-filtro" onclick="filtrar('ESTILISMO')">Estilismo</button>
        <button class="btn-filtro" onclick="filtrar('LASHISTA')">Lashista</button>
    </div>

    <div class="grid" id="contenedor-productos"></div>

    <div class="seccion-carrito">
        <h2>Tu Selección</h2>
        <div id="lista-carrito">Bolsa vacía.</div>
        <button class="btn-checkout" onclick="enviarPedidoWhatsApp()">Confirmar y Pedir por WhatsApp 📱</button>
    </div>

    <script>
       let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
        let listaProductosGlobal = [];

        function toggleMenu() {
            const menu = document.getElementById("side-menu");
            menu.style.width = menu.style.width === "250px" ? "0" : "250px";
        }

        async function cargarProductos() {
            try {
                const res = await fetch('productos.json');
                listaProductosGlobal = await res.json();
                renderizar(listaProductosGlobal);
            } catch (err) {
                console.error("Error al cargar JSON:", err);
            }
        }

        function filtrar(categoria) {
            if (categoria === 'TODOS') {
                renderizar(listaProductosGlobal);
            } else {
                const filtrados = listaProductosGlobal.filter(p => 
                    p.categoria && p.categoria.toUpperCase().trim() === categoria.toUpperCase().trim()
                );
                renderizar(filtrados);
            }
        }

        function renderizar(lista) {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = lista.map(p => {
                const itemEnCarrito = carrito.find(i => i.id === p.id);
                const disponibles = (p.stock || 10) - (itemEnCarrito ? itemEnCarrito.cantidad : 0);
                
                return `
                    <div class="card">
                        <div class="category" style="font-size: 0.8em; color: #d4a3b3;">${p.categoria || ''}</div>
                        <h3>${p.nombre}</h3>
                        <div class="stock" style="font-size: 0.9em; color: #8a6d75;">Disponibles: ${disponibles}</div>
                        <div class="price" style="font-weight: bold; color: #d4a3b3;">$${p.precio}</div>
                        <button onclick="agregar(${p.id}, '${p.nombre}', ${p.precio})" 
                                ${disponibles <= 0 ? 'disabled' : ''}>
                            ${disponibles <= 0 ? "Agotado" : "Añadir a la bolsa 🌸"}
                        </button>
                    </div>
                `;
            }).join('');
        }

        function agregar(id, nombre, precio) {
            let item = carrito.find(i => i.id === id);
            if (item) {
                item.cantidad++;
            } else {
                carrito.push({ id, nombre, precio, cantidad: 1 });
            }
            localStorage.setItem('carrito', JSON.stringify(carrito));
            actualizarUI();
            renderizar(listaProductosGlobal); 
        }

        function actualizarUI() {
            const contador = document.getElementById('contador-carrito');
            if (contador) contador.innerText = carrito.reduce((a, b) => a + b.cantidad, 0);

            const lista = document.getElementById('lista-carrito');
            if (carrito.length === 0) {
                lista.innerHTML = "Bolsa vacía.";
            } else {
                lista.innerHTML = carrito.map(item => `<p>${item.nombre} (x${item.cantidad}) - $${item.precio * item.cantidad}</p>`).join('');
            }
        }

        function enviarPedidoWhatsApp() {
            if (carrito.length === 0) return alert("Tu carrito está vacío.");
            let mensaje = "Hola, quisiera realizar el pedido de estos productos:\n\n";
            carrito.forEach(item => mensaje += `- ${item.nombre} (x${item.cantidad})\n`);
            window.open("https://wa.me/5591679278?text=" + encodeURIComponent(mensaje), '_blank');
        }

        cargarProductos();
        actualizarUI();
    </script>
</body>
</html>
