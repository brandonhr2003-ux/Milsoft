<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milsoft.mx | The Divine Feminine</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
  <div id="side-menu" class="side-menu">
    <span class="close-btn" onclick="toggleMenu()">&times;</span>
    <a href="#">MAQUILLAJE</a>
    <a href="#">MANICURISTA</a>
    <a href="#">ESTILISMO</a>
    <a href="#">LASHISTA</a>
</div>

    <div class="brand-header">
        <img src="Milsoft.jpeg" alt="Milsoft.mx Logo" style="max-width: 400px; width: 90%; height: auto; border-radius: 20px;">
    </div>

    <div class="header-cart">
        Bolsa: <span id="contador-carrito">0</span>
    </div>

   <div id="side-menu" class="side-menu">
    <span class="close-btn" onclick="toggleMenu()">&times;</span>
    <a href="#" onclick="filtrar('MAQUILLAJE')">MAQUILLAJE</a>
    <a href="#" onclick="filtrar('MANICURISTA')">MANICURISTA</a>
    <a href="#" onclick="filtrar('ESTILISMO')">ESTILISMO</a>
    <a href="#" onclick="filtrar('LASHISTA')">LASHISTA</a>
</div>

    <div class="grid" id="contenedor-productos"></div>

    <div class="seccion-carrito">
        <h2>Tu Selección</h2>
        <div id="lista-carrito">Bolsa vacía.</div>
        <button class="btn-checkout" onclick="enviarPedidoWhatsApp()">Confirmar y Pedir por WhatsApp 📱</button>
    </div>

    <script>
        let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
        let listaProductosGlobal = [];

        function toggleMenu() {
            const menu = document.getElementById("side-menu");
            menu.style.width = menu.style.width === "250px" ? "0" : "250px";
        }

        async function cargarProductos() {
            try {
                // He quitado el punto para que busque directo en la raíz
                const res = await fetch('productos.json');
                listaProductosGlobal = await res.json();
                renderizar(listaProductosGlobal);
            } catch (err) {
                console.error("Error al cargar productos:", err);
            }
        }

        function filtrar(categoria) {
            if (categoria === 'TODOS') {
                renderizar(listaProductosGlobal);
            } else {
                const filtrados = listaProductosGlobal.filter(p => 
                    p.categoria.toUpperCase().trim() === categoria.toUpperCase().trim()
                );
                renderizar(filtrados);
            }
        }

        function renderizar(lista) {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = lista.map(p => `
                <div class="card">
                    <h3>${p.nombre}</h3>
                    <p>$${p.precio}</p>
                    <button onclick="agregar(${p.id}, '${p.nombre}', ${p.precio})">Añadir</button>
                </div>
            `).join('');
        }

        function agregar(id, nombre, precio) {
            let item = carrito.find(i => i.id === id);
            item ? item.cantidad++ : carrito.push({ id, nombre, precio, cantidad: 1 });
            localStorage.setItem('carrito', JSON.stringify(carrito));
            actualizarUI();
        }

        function actualizarUI() {
            const contador = document.getElementById('contador-carrito');
            if (contador) contador.innerText = carrito.reduce((a, b) => a + b.cantidad, 0);
        }

        function enviarPedidoWhatsApp() {
            if (carrito.length === 0) return alert("Bolsa vacía");
            let mensaje = "Hola, quiero pedir: " + carrito.map(i => `${i.nombre} (x${i.cantidad})`).join(", ");
            window.open("https://wa.me/5591679278?text=" + encodeURIComponent(mensaje), '_blank');
        }

        cargarProductos();
        actualizarUI();
    </script>
</body>
</html>
